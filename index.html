<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

  <h1 class="title">☁️ Weather App</h1>

  <!-- 🔍 Search + Location -->
  <div class="top-bar">
    <input type="text" id="city" placeholder="Search city...">
    <button onclick="getWeatherByCity()">Search</button>
    <button class="location-btn" onclick="getWeatherByLocation()"><i class="fa-solid fa-location-dot"></i></button>
  </div>

  <!-- 📦 Main Layout -->
  <div class="main">

    <!-- Weather Card -->
    <div id="weatherResult" class="card">Loading...</div>

    <!-- Map -->
    <div id="map"></div>

  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
